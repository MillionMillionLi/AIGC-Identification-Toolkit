# ===================================
# 文本水印配置文件
# 支持多种文本水印算法：CredID, PostMark
# ===================================

# === 算法选择 ===
# 可选值: 'credid' (生成时嵌入) 或 'postmark' (后处理嵌入)
# 默认使用 PostMark（后处理水印，支持黑盒LLM）
algorithm: "postmark"

# ===================================
# CredID算法配置
# ===================================
credid:
  # === 基础配置 ===
  method: "CredID"                           # 水印算法名称
  model_name: "huggyllama/llama-7b"          # 使用的语言模型
  mode: "lm"                                 # 模式: "lm" (专家级) 或 "random" (快速版)
  device: "auto"                             # 设备: "auto", "cuda", "cpu"

  # === 生成参数 ===
  max_new_tokens: 50                         # 最大生成token数 (调整为更合理的长度)
  num_beams: 1                               # beam search参数 (使用采样而非beam search避免重复)
  do_sample: true                            # 是否采样
  temperature: 0.7                           # 生成温度
  top_p: 0.9                                  # nucleus sampling参数
  top_k: 50                                  # top-k采样参数
  repetition_penalty: 1.2                      # 重复惩罚因子，防止重复生成

  # === CredID语言模型参数 ===
  lm_params:
    delta: 2.0                               # logits修改强度 (水印强度)
    prefix_len: 10                           # 前缀长度（用于上下文分析）
    message_len: 10                          # 水印消息长度（位数）
    permutation_num: 50                      # 随机排列数量
    topk: -1                                 # top-k采样（-1表示不限制）
    seed: 42                                 # 随机种子
    hash_prefix_len: 1                       # 哈希前缀长度
    # CredID算法需要的shifts参数（哈希偏移量，与原项目保持一致）
    shifts:  [21, 24, 3, 8, 14,2, 4, 28, 31, 3, 8, 14, 2, 4, 28, 16, 7, 19, 25, 11, 33, 1, 0, 8, 34]

  # === CredID水印处理参数 ===
  wm_params:
    encode_ratio: 4                         # 编码比率（每多少个token嵌入1位）
    max_confidence: 0.5                      # 最大置信度阈值
    strategy: "vanilla"                      # 策略: "vanilla", "max_confidence", "max_confidence_updated"
    top_k: 1000                              # 处理器top-k参数
    seed: 42                                 # 水印处理随机种子

  # === 解码/提取参数 ===
  decode_batch_size: 16                      # 解码批次大小
  disable_tqdm: false                        # 是否禁用进度条
  confidence_threshold: 0.6                  # 置信度阈值（判断水印存在的最低置信度）

  # === 模型加载配置 ===
  model_config:
    torch_dtype: "float16"                   # 模型精度
    device_map: "auto"                       # 设备映射策略
    trust_remote_code: false                 # 是否信任远程代码
    cache_dir: "models/"                     # 模型缓存目录
    use_auth_token: false                    # 是否使用认证token

  # === 优化配置 ===
  optimization:
    use_cache: true                          # 是否使用KV缓存
    pad_token_id: null                       # 填充token ID（自动设置）
    eos_token_id: null                       # 结束token ID（自动设置）
    gradient_checkpointing: false            # 梯度检查点（节省内存）

  # === 日志配置 ===
  logging:
    level: "INFO"                            # 日志级别
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/credid_watermark.log"        # 日志文件路径

  # === 实验配置 ===
  experiment:
    name: "credid_baseline"                  # 实验名称
    save_results: true                       # 是否保存结果
    output_dir: "outputs/"                   # 输出目录
  
# ===================================
# PostMark算法配置（后处理水印）
# ===================================
postmark:
  # === 基础配置 ===
  embedder: "nomic"                        # 嵌入模型: "nomic" (推荐本地部署) 或 "openai"
  inserter: "mistral-7b-inst"              # 插入LLM: "mistral-7b-inst", "llama-3-8b-chat", "llama-3-70b-chat"
  ratio: 0.12                              # 水印词比例 (0.12 = 12%)
  iterate: "v2"                            # 迭代插入版本: "v2" (推荐)
  threshold: 0.7                           # 检测相似度阈值
  device: "auto"                           # 设备: "auto", "cuda", "cpu"
  inserter_temperature: 0.01               # 插入LLM采样温度(>0), 防止HF生成报错

  # === AI文本生成配置（新增） ===
  llm_for_generation: "mistral-7b-inst"    # 用于生成原始文本的LLM: "mistral-7b-inst" (推荐), "llama-3-8b-chat"
  max_tokens: 600                          # 最大生成token数（默认600，API调用时可覆盖）
  generation_temperature: 0.7              # 生成采样温度（控制随机性，0.0=确定性，1.0=高随机性）
  generation_top_p: 0.9                    # Nucleus sampling参数（可选）
  generation_top_k: 50                     # Top-k sampling参数（可选）

  # === PostMark模型缓存配置 ===
  cache_dir: null  # 默认使用 $HF_HOME 或 ~/.cache/huggingface

# ===================================
# 算法切换说明
# ===================================
#
# 如何切换算法:
#   修改顶部的 'algorithm' 参数为 'credid' 或 'postmark'
#
# CredID vs PostMark 对比:
#
#   CredID (生成时嵌入):
#     优点: 水印更深度集成，检测率高
#     缺点: 需要访问模型logits，仅适用于白盒LLM
#     适用场景: 自己部署的LLM，完全控制生成过程
#
#   PostMark (后处理嵌入):
#     优点: 黑盒LLM也可用（如GPT-4），更灵活
#     缺点: 需要二次LLM调用进行插入，成本略高
#     适用场景: 使用第三方API（OpenAI、Claude等）生成的文本
#
# 使用示例:
#
#   # 使用CredID
#   algorithm: "credid"
#
#   # 使用PostMark
#   algorithm: "postmark" 